<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capacity revenue comparison for 4-hour battery</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dm-bg: #FFFFFF; --dm-text: #333333; --dm-text2: #4a4a4a;
      --dm-muted: #AAAAAA; --dm-border: #E8E8E8; --dm-grid: #F0F0F0;
      --dm-tooltip-bg: #333333; --dm-tooltip-text: #FFFFFF; --dm-accent: #6F5FE5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --dm-bg: #1a1a1a; --dm-text: #d4d4d4; --dm-text2: #a0a0a0;
        --dm-muted: #888888; --dm-border: #2e2e2e; --dm-grid: #2e2e2e;
        --dm-tooltip-bg: #2a2a2a; --dm-tooltip-text: #d4d4d4; --dm-accent: #B7AFF2;
      }
    }
    html, body { width: 100%; height: 100%; overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dm-bg); color: var(--dm-text); }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { ResponsiveContainer, BarChart, Bar, Cell, XAxis, YAxis, CartesianGrid, Tooltip, LabelList } = Recharts;
    var e = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;

    function useDarkMode() {
      var s = useState(window.matchMedia('(prefers-color-scheme: dark)').matches);
      var dark = s[0]; var setDark = s[1];
      useEffect(function() {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function onChange(ev) { setDark(ev.matches); }
        mq.addEventListener('change', onChange);
        return function() { mq.removeEventListener('change', onChange); };
      }, []);
      return dark;
    }
    function useWindowSize() {
      var s = useState({ width: window.innerWidth, height: window.innerHeight });
      var size = s[0]; var setSize = s[1];
      useEffect(function() {
        function onResize() { setSize({ width: window.innerWidth, height: window.innerHeight }); }
        window.addEventListener("resize", onResize);
        return function() { window.removeEventListener("resize", onResize); };
      }, []);
      return size;
    }

    // === DATA ===
    // Annual capacity / reliability revenue per MW for a 4-hour battery, latest cleared auction or contract.
    // CAISO Resource Adequacy: Modo Energy (Apr 2025, ID 18477) — $9.68/kW-month in Dec 2025 = $116k/MW/year for a fully-contracted 4H battery.
    // Germany 2026 auctions not yet cleared. ERCOT operates as an energy-only market.
    var data = [
      { market: "CAISO",              value: 116000, label: "$116k", sub: "RA contract (4H, Dec 2025)",        cleared: true,  category: "bilateral" },
      { market: "PJM RPM (26/27 BRA)", value: 60000,  label: "$60k",  sub: "50% ELCC (4-hour)",                cleared: true,  category: "centralised" },
      { market: "GB Capacity Market", value: 25000,  label: "$25k",  sub: "44% de-rating credit",              cleared: true,  category: "centralised" },
      { market: "Germany",            value: 0,      label: "TBD",   sub: "2026 auctions not yet cleared",     cleared: false, category: "centralised" },
      { market: "ERCOT",              value: 0,      label: "$0",    sub: "Energy-only market",                cleared: false, category: "none" }
    ];

    function getColors(dark) {
      return {
        text: dark ? "#d4d4d4" : "#333333",
        text2: dark ? "#a0a0a0" : "#4a4a4a",
        muted: dark ? "#888888" : "#AAAAAA",
        bg: dark ? "#1a1a1a" : "#FFFFFF",
        grid: dark ? "#2e2e2e" : "#F0F0F0",
        border: dark ? "#2e2e2e" : "#E8E8E8",
        tooltipBg: dark ? "#2a2a2a" : "#333333",
        tooltipText: dark ? "#d4d4d4" : "#FFFFFF",
        accent: dark ? "#B7AFF2" : "#6F5FE5",
        centralisedFill: "#27AC60",
        bilateralFill: "#6F5FE5",
        pendingFill: dark ? "#3a3a3a" : "#D9D9D9"
      };
    }

    function downloadCSV(data, filename) {
      if (!data || !data.length) return;
      var keys = ["market","value","sub"];
      var csv = keys.join(',') + '\n';
      data.forEach(function(row) {
        csv += [
          row.market.indexOf(',')>=0 ? '"'+row.market+'"' : row.market,
          row.value,
          row.sub.indexOf(',')>=0 ? '"'+row.sub+'"' : row.sub
        ].join(',') + '\n';
      });
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url;
      a.download = (filename || 'chart-data') + '.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    function ModoTooltip(props) {
      if (!props.active || !props.payload || !props.payload.length) return null;
      var colors = props.colors || getColors(false);
      var d = props.payload[0].payload;
      return e("div", {
        style: { backgroundColor: colors.tooltipBg, padding: "8px 12px", borderRadius: 6,
          fontFamily: "'DM Sans', sans-serif", maxWidth: 240, border: "1px solid " + colors.border }
      },
        e("p", { style: { fontSize: 11, color: colors.muted, marginBottom: 6, fontWeight: 500 } }, d.market),
        e("p", { style: { fontSize: 11, color: colors.tooltipText, lineHeight: 1.6 } },
          d.cleared ? ("Capacity revenue: $" + d.value.toLocaleString() + "/MW/year") : d.label),
        e("p", { style: { fontSize: 11, color: colors.muted, marginTop: 2 } }, d.sub)
      );
    }

    function ModoChart() {
      var w = useWindowSize().width;
      var mob = w < 640;
      var tab = w >= 640 && w < 1024;
      var dark = useDarkMode();
      var c = getColors(dark);

      var fs = {
        header: mob ? 15 : tab ? 18 : 21,
        sub: mob ? 11 : tab ? 13 : 14,
        xTick: mob ? 9 : tab ? 10 : 11,
        yTick: mob ? 9 : tab ? 10 : 11,
        labelMain: mob ? 11 : tab ? 13 : 14,
        labelSub: mob ? 9 : tab ? 10 : 11,
        footer: mob ? 9 : tab ? 10 : 11,
        wordmark: mob ? 14 : tab ? 18 : 22
      };
      var margin = mob ? { top: 40, right: 8, left: 0, bottom: 30 }
        : tab ? { top: 50, right: 12, left: 5, bottom: 35 }
        : { top: 55, right: 16, left: 8, bottom: 40 };
      var pad = mob ? "12px 10px 8px 10px" : tab ? "18px 20px 12px 20px" : "24px 28px 16px 28px";

      // Custom label rendering above each bar (main value + sub-annotation)
      function renderBarLabel(props) {
        var d = data[props.index];
        var x = props.x + props.width / 2;
        var topY = d.cleared ? props.y - 6 : props.y - 20;
        return e("g", null,
          e("text", {
            x: x, y: topY,
            textAnchor: "middle",
            fontSize: fs.labelMain,
            fill: d.cleared ? c.text : c.text2,
            fontWeight: 500,
            fontFamily: "'DM Sans', sans-serif"
          }, d.label),
          e("text", {
            x: x, y: topY + fs.labelMain + 2,
            textAnchor: "middle",
            fontSize: fs.labelSub,
            fill: c.muted,
            fontFamily: "'DM Sans', sans-serif"
          }, d.sub)
        );
      }

      function renderXTick(props) {
        var d = data[props.index];
        var lines = d.market.split(" ");
        // Allow market labels up to 3 lines; wrap if more than 2 words
        var firstLine = lines.slice(0, Math.ceil(lines.length / 2)).join(" ");
        var secondLine = lines.slice(Math.ceil(lines.length / 2)).join(" ");
        return e("g", { transform: "translate(" + props.x + "," + props.y + ")" },
          e("text", { y: 12, textAnchor: "middle", fontSize: fs.xTick, fill: c.text, fontFamily: "'DM Sans', sans-serif" }, firstLine),
          secondLine ? e("text", { y: 12 + fs.xTick + 2, textAnchor: "middle", fontSize: fs.xTick, fill: c.text, fontFamily: "'DM Sans', sans-serif" }, secondLine) : null
        );
      }

      return e("div", {
        style: { display: "flex", flexDirection: "column", width: "100%", height: "100%",
          padding: pad, fontFamily: "'DM Sans', sans-serif", background: c.bg }
      },
        e("div", { style: { marginBottom: mob ? 4 : 8 } },
          e("h1", { style: { fontSize: fs.header, fontWeight: 400, color: c.text, lineHeight: 1.3 } },
            "What does a capacity market contract pay a 4-hour battery?"),
          e("p", { style: { fontSize: fs.sub, color: c.text2, marginTop: mob ? 3 : 6 } },
            "Annual capacity revenue per MW for a 4-hour battery, latest cleared auction")
        ),

        e("div", { style: { flex: 1, minHeight: 0 } },
          e(ResponsiveContainer, { width: "100%", height: "100%" },
            e(BarChart, { data: data, margin: margin, barCategoryGap: "20%" },
              e(CartesianGrid, { horizontal: true, vertical: false, stroke: c.grid }),
              e(XAxis, { dataKey: "market",
                tick: renderXTick,
                axisLine: { stroke: c.border }, tickLine: false,
                interval: 0, height: 50 }),
              e(YAxis, {
                tick: { fontSize: fs.yTick, fill: c.text2, fontFamily: "'DM Sans', sans-serif" },
                axisLine: false, tickLine: false,
                tickFormatter: function(v) { return "$" + (v/1000) + "k"; },
                domain: [0, 130000], ticks: [0, 30000, 60000, 90000, 120000],
                width: mob ? 50 : 60 }),
              e(Tooltip, { content: e(ModoTooltip, { colors: c }),
                cursor: { fill: dark ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.03)" } }),
              e(Bar, { dataKey: "value",
                radius: [2, 2, 0, 0],
                animationDuration: 800, animationEasing: "ease-in-out",
                label: renderBarLabel },
                data.map(function(entry, i) {
                  var fillColor;
                  if (!entry.cleared) { fillColor = c.pendingFill; }
                  else if (entry.category === "bilateral") { fillColor = c.bilateralFill; }
                  else { fillColor = c.centralisedFill; }
                  return e(Cell, { key: i,
                    fill: fillColor,
                    stroke: entry.cleared ? "none" : c.muted,
                    strokeDasharray: entry.cleared ? "0" : "3 3"
                  });
                })
              )
            )
          )
        ),

        e("div", {
          style: { display: "flex", justifyContent: "space-between",
            alignItems: mob ? "flex-start" : "flex-end",
            flexDirection: mob ? "column" : "row",
            gap: mob ? 6 : 0, marginTop: 8, paddingTop: 8,
            borderTop: "1px solid " + c.border }
        },
          e("div", { style: { flex: 1 } },
            e("p", { style: { fontSize: fs.footer, color: c.muted } },
              "Source: Modo Energy analysis of GB Capacity Market T-1/T-4 results, PJM 2026/27 Base Residual Auction, and CAISO Resource Adequacy contract data (Modo Energy, April 2025)."),
            e("p", { style: { fontSize: fs.footer, color: c.muted, marginTop: 2 } },
              "Note: Green bars are centralised auction clearings; purple is bilateral Resource Adequacy. ERCOT operates as an energy-only market with no capacity payments. Germany 2026 auctions are pending."),
            e("button", {
              onClick: function() { downloadCSV(data, "capacity-revenue-4hr-battery"); },
              style: { fontFamily: "'DM Sans', sans-serif", fontSize: fs.footer,
                fontWeight: 500, color: c.accent, background: "none",
                border: "none", outline: "none", boxShadow: "none",
                padding: 0, cursor: "pointer", marginTop: 4,
                display: "inline-flex", alignItems: "center", gap: 4 }
            },
              e("svg", { width: 12, height: 12, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: 2,
                strokeLinecap: "round", strokeLinejoin: "round", "aria-hidden": true },
                e("path", { d: "M12 4v14m0 0l-6-6m6 6l6-6" })
              ),
              "Download data"
            )
          ),
          e("span", {
            style: { fontSize: fs.wordmark, fontWeight: 700,
              letterSpacing: "0.25em", color: c.text, whiteSpace: "nowrap",
              alignSelf: mob ? "flex-end" : "auto" }
          }, "MODOENERGY")
        )
      );
    }

    (function() {
      var rendered = false;
      var observer = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting && !rendered) {
          rendered = true; observer.disconnect();
          ReactDOM.createRoot(document.getElementById('root')).render(e(ModoChart));
        }
      }, { threshold: 0.1 });
      observer.observe(document.getElementById('root'));
    })();
  </script>
</body>
</html>
