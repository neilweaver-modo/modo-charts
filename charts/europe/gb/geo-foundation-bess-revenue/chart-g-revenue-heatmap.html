<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BESS revenue heatmap by market and stream</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dm-bg: #FFFFFF; --dm-text: #333333; --dm-text2: #4a4a4a;
      --dm-muted: #AAAAAA; --dm-border: #E8E8E8; --dm-grid: #F0F0F0;
      --dm-tooltip-bg: #333333; --dm-tooltip-text: #FFFFFF; --dm-accent: #6F5FE5;
      --dm-cell-empty-bg: #F7F7F7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --dm-bg: #1a1a1a; --dm-text: #d4d4d4; --dm-text2: #a0a0a0;
        --dm-muted: #888888; --dm-border: #2e2e2e; --dm-grid: #2e2e2e;
        --dm-tooltip-bg: #2a2a2a; --dm-tooltip-text: #d4d4d4; --dm-accent: #B7AFF2;
        --dm-cell-empty-bg: #232323;
      }
    }
    html, body { width: 100%; height: 100%; overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dm-bg); color: var(--dm-text); }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    var e = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;

    function useDarkMode() {
      var s = useState(window.matchMedia('(prefers-color-scheme: dark)').matches);
      var dark = s[0]; var setDark = s[1];
      useEffect(function() {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function onChange(ev) { setDark(ev.matches); }
        mq.addEventListener('change', onChange);
        return function() { mq.removeEventListener('change', onChange); };
      }, []);
      return dark;
    }
    function useWindowSize() {
      var s = useState({ width: window.innerWidth, height: window.innerHeight });
      var size = s[0]; var setSize = s[1];
      useEffect(function() {
        function onResize() { setSize({ width: window.innerWidth, height: window.innerHeight }); }
        window.addEventListener("resize", onResize);
        return function() { window.removeEventListener("resize", onResize); };
      }, []);
      return size;
    }

    // === DATA ===
    // BESS revenue per MW/year by stream and market (USD-equivalent), latest 12 months.
    // Source: Modo Energy ME BESS Indices (ERCOT to Mar 2026, CAISO/GB to Apr 2026); Modo analysis for Germany.
    // FX: GBP→USD = 1.26 (GB), EUR→USD = 1.08 (Germany).
    var markets = ["ERCOT", "CAISO", "GB", "Germany*"];
    var streams = ["Wholesale energy", "Balancing markets", "Ancillary services", "Reliability payments"];
    // values[market_idx][stream_idx]
    // Energy + balancing + ancillary cells are 2H battery basis from ME BESS Indices, trailing 12 months.
    // Reliability column: GB Capacity Market clears at 4H-equivalent. CAISO RA is bilateral and quoted on 4H contract basis (Modo Energy, Apr 2025, article ID 18477; $9.68/kW-month in Dec 2025 = $116k/MW/year).
    var values = [
      [23980, 0,     9106,  0],          // ERCOT
      [27579, 0,     3042,  116000],     // CAISO — RA at 4H basis
      [27605, 30517, 24812, 9385],       // GB
      [48000, 0,     25000, 0]           // Germany* indicative
    ];
    var notes = [
      ["", "no central balancing market", "", "energy-only market"],
      ["", "no central balancing market", "", "Resource Adequacy (4H contract, Dec 2025)"],
      ["", "Balancing Mechanism + imbalance", "net of DRH costs", "GB Capacity Market"],
      ["indicative", "no central balancing market", "indicative; FCR/aFRR/mFRR plus inertia", "no central capacity market yet"]
    ];

    function getColors(dark) {
      return {
        text: dark ? "#d4d4d4" : "#333333",
        text2: dark ? "#a0a0a0" : "#4a4a4a",
        muted: dark ? "#888888" : "#AAAAAA",
        bg: dark ? "#1a1a1a" : "#FFFFFF",
        border: dark ? "#2e2e2e" : "#E8E8E8",
        tooltipBg: dark ? "#2a2a2a" : "#333333",
        tooltipText: dark ? "#d4d4d4" : "#FFFFFF",
        accent: dark ? "#B7AFF2" : "#6F5FE5",
        cellEmpty: dark ? "#232323" : "#F7F7F7"
      };
    }

    // Linear scale white -> Modo orange (#E59C58) anchored on max value across all cells
    var maxVal = 0;
    values.forEach(function(row){ row.forEach(function(v){ if (v > maxVal) maxVal = v; }); });

    function cellFill(v, dark) {
      if (!v) return dark ? "#232323" : "#F7F7F7";
      var t = Math.min(1, v / maxVal);
      // interpolate between pale-orange and #E59C58
      var r0 = dark ? 35 : 255, g0 = dark ? 35 : 245, b0 = dark ? 35 : 230;
      var r1 = 229, g1 = 156, b1 = 88;
      var r = Math.round(r0 + (r1 - r0) * t);
      var g = Math.round(g0 + (g1 - g0) * t);
      var b = Math.round(b0 + (b1 - b0) * t);
      return "rgb(" + r + "," + g + "," + b + ")";
    }
    function cellText(v, dark) {
      if (!v) return dark ? "#888" : "#AAA";
      var t = Math.min(1, v / maxVal);
      // darker text on lighter cells, white on darker cells
      return t > 0.55 ? "#1a1a1a" : (dark ? "#d4d4d4" : "#333333");
    }

    function downloadCSV(filename) {
      var keys = ["market"].concat(streams);
      var csv = keys.join(',') + '\n';
      markets.forEach(function(m, mi) {
        var row = [m].concat(values[mi]);
        csv += row.join(',') + '\n';
      });
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url;
      a.download = (filename || 'chart-data') + '.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    function ModoChart() {
      var w = useWindowSize().width;
      var mob = w < 640;
      var tab = w >= 640 && w < 1024;
      var dark = useDarkMode();
      var c = getColors(dark);

      var hoverState = useState(null);
      var hover = hoverState[0]; var setHover = hoverState[1];

      var fs = {
        header: mob ? 15 : tab ? 18 : 21,
        sub: mob ? 11 : tab ? 13 : 14,
        rowLabel: mob ? 11 : tab ? 12 : 13,
        colLabel: mob ? 10 : tab ? 11 : 12,
        cellVal: mob ? 11 : tab ? 14 : 16,
        cellNote: mob ? 8 : tab ? 9 : 10,
        footer: mob ? 9 : tab ? 10 : 11,
        wordmark: mob ? 14 : tab ? 18 : 22
      };
      var pad = mob ? "12px 10px 8px 10px" : tab ? "18px 20px 12px 20px" : "24px 28px 16px 28px";

      function formatVal(v) {
        if (!v) return "—";
        if (v >= 1000) return "$" + (v / 1000).toFixed(v < 10000 ? 1 : 0) + "k";
        return "$" + v;
      }

      return e("div", {
        style: { display: "flex", flexDirection: "column", width: "100%", height: "100%",
          padding: pad, fontFamily: "'DM Sans', sans-serif", background: c.bg }
      },
        e("div", { style: { marginBottom: mob ? 4 : 8 } },
          e("h1", { style: { fontSize: fs.header, fontWeight: 400, color: c.text, lineHeight: 1.3 } },
            "Which revenue streams pay the most, in which markets?"),
          e("p", { style: { fontSize: fs.sub, color: c.text2, marginTop: mob ? 3 : 6 } },
            "Annual revenue per MW by stream and market, latest twelve months (USD-equivalent)")
        ),

        // Heatmap grid: header row + 4 market rows
        e("div", {
          style: { flex: 1, minHeight: 0, display: "grid",
            gridTemplateColumns: "minmax(70px, auto) repeat(" + streams.length + ", minmax(0, 1fr))",
            gridTemplateRows: "auto repeat(" + markets.length + ", minmax(0, 1fr))",
            gap: 4, marginBottom: 6 }
        },
          // top-left empty
          e("div", { key: "tl" }),
          // column headers
          streams.map(function(s, si) {
            return e("div", { key: "col-"+si,
              style: { fontSize: fs.colLabel, color: c.text2,
                textAlign: "center", padding: "6px 4px",
                fontFamily: "'DM Sans', sans-serif",
                lineHeight: 1.2 } }, s);
          }),
          // body rows
          markets.map(function(m, mi) {
            return [
              e("div", { key: "row-"+mi,
                style: { display: "flex", alignItems: "center",
                  fontSize: fs.rowLabel, color: c.text, fontWeight: 500,
                  padding: "0 8px 0 0", fontFamily: "'DM Sans', sans-serif" } }, m)
            ].concat(streams.map(function(s, si) {
              var v = values[mi][si];
              var isHovered = hover && hover[0] === mi && hover[1] === si;
              return e("div", { key: "cell-"+mi+"-"+si,
                onMouseEnter: function() { setHover([mi, si]); },
                onMouseLeave: function() { setHover(null); },
                style: {
                  background: cellFill(v, dark),
                  color: cellText(v, dark),
                  border: isHovered ? "1px solid " + c.text : "1px solid " + c.border,
                  borderRadius: 4,
                  display: "flex", flexDirection: "column",
                  alignItems: "center", justifyContent: "center",
                  fontFamily: "'DM Sans', sans-serif",
                  minHeight: mob ? 56 : 80,
                  padding: 6, transition: "border 0.15s"
                }
              },
                e("div", { style: { fontSize: fs.cellVal, fontWeight: 500 } }, formatVal(v)),
                notes[mi][si] ? e("div", {
                  style: { fontSize: fs.cellNote, color: cellText(v, dark),
                    opacity: 0.75, marginTop: 2, textAlign: "center", lineHeight: 1.2 }
                }, notes[mi][si]) : null
              );
            }));
          }).flat()
        ),

        // Footer
        e("div", {
          style: { display: "flex", justifyContent: "space-between",
            alignItems: mob ? "flex-start" : "flex-end",
            flexDirection: mob ? "column" : "row",
            gap: mob ? 6 : 0, marginTop: 8, paddingTop: 8,
            borderTop: "1px solid " + c.border }
        },
          e("div", { style: { flex: 1 } },
            e("p", { style: { fontSize: fs.footer, color: c.muted } },
              "Source: Modo Energy ME BESS Indices (energy, balancing, ancillary), trailing 12 months to April 2026 (ERCOT to March 2026); Modo Energy analysis for Germany and for CAISO Resource Adequacy (April 2025). Currency normalised to USD."),
            e("p", { style: { fontSize: fs.footer, color: c.muted, marginTop: 2 } },
              "Note: Energy, balancing and ancillary cells are 2-hour battery basis. The CAISO RA cell is on a 4-hour-contract basis since RA values capacity that can sustain 4 hours at full power — for a 2-hour battery the equivalent is roughly half."),
            e("button", {
              onClick: function() { downloadCSV("bess-revenue-stream-by-market-heatmap"); },
              style: { fontFamily: "'DM Sans', sans-serif", fontSize: fs.footer,
                fontWeight: 500, color: c.accent, background: "none",
                border: "none", outline: "none", boxShadow: "none",
                padding: 0, cursor: "pointer", marginTop: 4,
                display: "inline-flex", alignItems: "center", gap: 4 }
            },
              e("svg", { width: 12, height: 12, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: 2,
                strokeLinecap: "round", strokeLinejoin: "round", "aria-hidden": true },
                e("path", { d: "M12 4v14m0 0l-6-6m6 6l6-6" })
              ),
              "Download data"
            )
          ),
          e("span", {
            style: { fontSize: fs.wordmark, fontWeight: 700,
              letterSpacing: "0.25em", color: c.text, whiteSpace: "nowrap",
              alignSelf: mob ? "flex-end" : "auto" }
          }, "MODOENERGY")
        )
      );
    }

    (function() {
      var rendered = false;
      var observer = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting && !rendered) {
          rendered = true; observer.disconnect();
          ReactDOM.createRoot(document.getElementById('root')).render(e(ModoChart));
        }
      }, { threshold: 0.1 });
      observer.observe(document.getElementById('root'));
    })();
  </script>
</body>
</html>
