<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What is a top-bottom spread? TB methodology illustration</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --dm-bg: #FFFFFF; --dm-text: #333333; --dm-text2: #4a4a4a;
      --dm-muted: #AAAAAA; --dm-border: #E8E8E8; --dm-grid: #F0F0F0;
      --dm-tooltip-bg: #333333; --dm-tooltip-text: #FFFFFF; --dm-accent: #6F5FE5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --dm-bg: #1a1a1a; --dm-text: #d4d4d4; --dm-text2: #a0a0a0;
        --dm-muted: #888888; --dm-border: #2e2e2e; --dm-grid: #2e2e2e;
        --dm-tooltip-bg: #2a2a2a; --dm-tooltip-text: #d4d4d4; --dm-accent: #B7AFF2;
      }
    }
    html, body { width: 100%; height: 100%; overflow: hidden;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dm-bg); color: var(--dm-text); }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { ResponsiveContainer, ComposedChart, Line, ReferenceArea, ReferenceDot, XAxis, YAxis, CartesianGrid, Tooltip } = Recharts;
    var e = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;

    function useDarkMode() {
      var s = useState(window.matchMedia('(prefers-color-scheme: dark)').matches);
      var dark = s[0]; var setDark = s[1];
      useEffect(function() {
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        function onChange(ev) { setDark(ev.matches); }
        mq.addEventListener('change', onChange);
        return function() { mq.removeEventListener('change', onChange); };
      }, []);
      return dark;
    }
    function useWindowSize() {
      var s = useState({ width: window.innerWidth, height: window.innerHeight });
      var size = s[0]; var setSize = s[1];
      useEffect(function() {
        function onResize() { setSize({ width: window.innerWidth, height: window.innerHeight }); }
        window.addEventListener("resize", onResize);
        return function() { window.removeEventListener("resize", onResize); };
      }, []);
      return size;
    }

    // === DATA ===
    // GB day-ahead price profile, 17 February 2026 (illustrative).
    // TB1: top hour 18:00 (£180), bottom hour 13:00 (£8) → daily spread £172.
    // TB2: top hours 17:00–18:00, bottom hours 12:00–13:00.
    // TB4: top hours 17:00–20:00, bottom hours 11:00–14:00.
    var data = [
      { hour: 0,  price: 45 },  { hour: 1,  price: 38 },  { hour: 2,  price: 32 },
      { hour: 3,  price: 28 },  { hour: 4,  price: 30 },  { hour: 5,  price: 42 },
      { hour: 6,  price: 75 },  { hour: 7,  price: 110 }, { hour: 8,  price: 95 },
      { hour: 9,  price: 60 },  { hour: 10, price: 38 },  { hour: 11, price: 22 },
      { hour: 12, price: 12 },  { hour: 13, price: 8 },   { hour: 14, price: 15 },
      { hour: 15, price: 35 },  { hour: 16, price: 70 },  { hour: 17, price: 140 },
      { hour: 18, price: 180 }, { hour: 19, price: 165 }, { hour: 20, price: 120 },
      { hour: 21, price: 85 },  { hour: 22, price: 65 },  { hour: 23, price: 52 }
    ];

    function getColors(dark) {
      return {
        text: dark ? "#d4d4d4" : "#333333",
        text2: dark ? "#a0a0a0" : "#4a4a4a",
        muted: dark ? "#888888" : "#AAAAAA",
        bg: dark ? "#1a1a1a" : "#FFFFFF",
        grid: dark ? "#2e2e2e" : "#F0F0F0",
        border: dark ? "#2e2e2e" : "#E8E8E8",
        tooltipBg: dark ? "#2a2a2a" : "#333333",
        tooltipText: dark ? "#d4d4d4" : "#FFFFFF",
        accent: dark ? "#B7AFF2" : "#6F5FE5",
        lineColor: dark ? "#d4d4d4" : "#333333",
        topBand: dark ? "rgba(229,156,88,0.18)" : "rgba(229,156,88,0.22)",
        topBandBorder: "#E59C58",
        bottomBand: dark ? "rgba(70,126,228,0.18)" : "rgba(70,126,228,0.22)",
        bottomBandBorder: "#467EE4"
      };
    }

    function downloadCSV(data, filename) {
      if (!data || !data.length) return;
      var keys = ["hour","price"];
      var csv = keys.join(',') + '\n';
      data.forEach(function(row) { csv += keys.map(function(k){ return row[k]; }).join(',') + '\n'; });
      var blob = new Blob([csv], { type: 'text/csv' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href = url;
      a.download = (filename || 'chart-data') + '.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    function ModoTooltip(props) {
      if (!props.active || !props.payload || !props.payload.length) return null;
      var colors = props.colors || getColors(false);
      var hr = String(props.label).padStart(2,'0') + ":00";
      return e("div", {
        style: { backgroundColor: colors.tooltipBg, padding: "8px 12px", borderRadius: 6,
          fontFamily: "'DM Sans', sans-serif", maxWidth: 220, border: "1px solid " + colors.border }
      },
        e("p", { style: { fontSize: 11, color: colors.muted, marginBottom: 6, fontWeight: 500 } }, hr),
        props.payload.map(function(entry, i) {
          return e("p", { key: i, style: { fontSize: 11, color: colors.tooltipText, lineHeight: 1.6 } },
            e("span", { style: { color: entry.color } }, "● "),
            "Price: £" + entry.value + "/MWh"
          );
        })
      );
    }

    function ModoChart() {
      var w = useWindowSize().width;
      var mob = w < 640;
      var tab = w >= 640 && w < 1024;
      var dark = useDarkMode();
      var c = getColors(dark);

      var fs = {
        header: mob ? 15 : tab ? 18 : 21,
        sub: mob ? 11 : tab ? 13 : 14,
        xTick: mob ? 9 : tab ? 10 : 11,
        yTick: mob ? 9 : tab ? 10 : 11,
        annotation: mob ? 10 : tab ? 11 : 12,
        footer: mob ? 9 : tab ? 10 : 11,
        wordmark: mob ? 14 : tab ? 18 : 22
      };
      var margin = mob ? { top: 30, right: 12, left: 0, bottom: 5 }
        : tab ? { top: 35, right: 18, left: 5, bottom: 5 }
        : { top: 40, right: 24, left: 8, bottom: 5 };
      var pad = mob ? "12px 10px 8px 10px" : tab ? "18px 20px 12px 20px" : "24px 28px 16px 28px";

      // Inline legend showing the two shaded bands
      var legend = e("div", {
        style: { display: "flex", flexWrap: "wrap", gap: "6px 14px",
          marginBottom: mob ? 6 : 10, fontFamily: "'DM Sans', sans-serif",
          fontSize: fs.annotation, color: c.text2 }
      },
        e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
          e("div", { style: { width: 14, height: 10, background: c.topBand,
            border: "1px solid " + c.topBandBorder, borderRadius: 2 } }),
          e("span", null, "Top 4 hours (charge to discharge from)")
        ),
        e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
          e("div", { style: { width: 14, height: 10, background: c.bottomBand,
            border: "1px solid " + c.bottomBandBorder, borderRadius: 2 } }),
          e("span", null, "Bottom 4 hours (charge during)")
        )
      );

      return e("div", {
        style: { display: "flex", flexDirection: "column", width: "100%", height: "100%",
          padding: pad, fontFamily: "'DM Sans', sans-serif", background: c.bg }
      },
        e("div", { style: { marginBottom: mob ? 4 : 8 } },
          e("h1", { style: { fontSize: fs.header, fontWeight: 400, color: c.text, lineHeight: 1.3 } },
            "What is a top-bottom spread?"),
          e("p", { style: { fontSize: fs.sub, color: c.text2, marginTop: mob ? 3 : 6 } },
            "GB day-ahead prices, 17 February 2026 (illustrative day), with TB1, TB2 and TB4 periods highlighted")
        ),
        legend,

        e("div", { style: { flex: 1, minHeight: 0 } },
          e(ResponsiveContainer, { width: "100%", height: "100%" },
            e(ComposedChart, { data: data, margin: margin },
              e(CartesianGrid, { horizontal: true, vertical: false, stroke: c.grid }),
              // TB4 shaded bands (covers TB1 and TB2 too)
              e(ReferenceArea, { x1: 16.5, x2: 20.5, fill: c.topBand, stroke: c.topBandBorder, strokeOpacity: 0.5, ifOverflow: "visible" }),
              e(ReferenceArea, { x1: 10.5, x2: 14.5, fill: c.bottomBand, stroke: c.bottomBandBorder, strokeOpacity: 0.5, ifOverflow: "visible" }),
              e(XAxis, { dataKey: "hour",
                type: "number", domain: [0, 23], ticks: [0, 4, 8, 12, 16, 20, 23],
                tickFormatter: function(v) { return String(v).padStart(2,'0') + ":00"; },
                tick: { fontSize: fs.xTick, fill: c.text2, fontFamily: "'DM Sans', sans-serif" },
                axisLine: { stroke: c.border }, tickLine: false }),
              e(YAxis, {
                tick: { fontSize: fs.yTick, fill: c.text2, fontFamily: "'DM Sans', sans-serif" },
                axisLine: false, tickLine: false,
                domain: [0, 200], ticks: [0, 50, 100, 150, 200],
                tickFormatter: function(v) { return "£" + v; },
                width: mob ? 38 : 48 }),
              e(Tooltip, { content: e(ModoTooltip, { colors: c }),
                cursor: { stroke: c.muted, strokeWidth: 1, strokeDasharray: "3 3" } }),
              e(Line, { dataKey: "price", type: "linear",
                stroke: c.lineColor, strokeWidth: 2, dot: false,
                animationDuration: 800, animationEasing: "ease-in-out" }),
              // TB1 max dot (18:00, £180)
              e(ReferenceDot, { x: 18, y: 180, r: 5,
                fill: "#E59C58", stroke: c.bg, strokeWidth: 2,
                ifOverflow: "visible",
                label: { value: "TB1 top  £180", position: "top",
                  fontSize: fs.annotation, fill: c.text, fontFamily: "'DM Sans', sans-serif" } }),
              // TB1 min dot (13:00, £8) — label sits above the dot to avoid colliding with the x-axis
              e(ReferenceDot, { x: 13, y: 8, r: 5,
                fill: "#467EE4", stroke: c.bg, strokeWidth: 2,
                ifOverflow: "visible",
                label: { value: "TB1 bottom  £8", position: "top",
                  fontSize: fs.annotation, fill: c.text, fontFamily: "'DM Sans', sans-serif" } })
            )
          )
        ),

        e("div", {
          style: { display: "flex", justifyContent: "space-between",
            alignItems: mob ? "flex-start" : "flex-end",
            flexDirection: mob ? "column" : "row",
            gap: mob ? 6 : 0, marginTop: 8, paddingTop: 8,
            borderTop: "1px solid " + c.border }
        },
          e("div", { style: { flex: 1 } },
            e("p", { style: { fontSize: fs.footer, color: c.muted } },
              "Source: Modo Energy, GB day-ahead market."),
            e("p", { style: { fontSize: fs.footer, color: c.muted, marginTop: 2 } },
              "Note: TB1 = the single highest and single lowest hour (£172 on this day). TB2 doubles to two hours each. TB4 doubles again to four. The daily TB scaled by 365 gives the annualised TB £/MW/year metric."),
            e("button", {
              onClick: function() { downloadCSV(data, "tb-methodology-illustrative-day"); },
              style: { fontFamily: "'DM Sans', sans-serif", fontSize: fs.footer,
                fontWeight: 500, color: c.accent, background: "none",
                border: "none", outline: "none", boxShadow: "none",
                padding: 0, cursor: "pointer", marginTop: 4,
                display: "inline-flex", alignItems: "center", gap: 4 }
            },
              e("svg", { width: 12, height: 12, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: 2,
                strokeLinecap: "round", strokeLinejoin: "round", "aria-hidden": true },
                e("path", { d: "M12 4v14m0 0l-6-6m6 6l6-6" })
              ),
              "Download data"
            )
          ),
          e("span", {
            style: { fontSize: fs.wordmark, fontWeight: 700,
              letterSpacing: "0.25em", color: c.text, whiteSpace: "nowrap",
              alignSelf: mob ? "flex-end" : "auto" }
          }, "MODOENERGY")
        )
      );
    }

    (function() {
      var rendered = false;
      var observer = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting && !rendered) {
          rendered = true; observer.disconnect();
          ReactDOM.createRoot(document.getElementById('root')).render(e(ModoChart));
        }
      }, { threshold: 0.1 });
      observer.observe(document.getElementById('root'));
    })();
  </script>
</body>
</html>
